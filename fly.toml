# DocketMind — Fly.io configuration
#
# This is a background worker (no HTTP ingress). Discord uses websockets
# and Slack uses socket mode, so no public IP or [http_service] is needed.
#
# All persistent state (SQLite DB, LlamaIndex vector store, cached PDFs)
# lives under /data, which is backed by a Fly volume.

app = 'docketmind'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[deploy]
  # Migrations run on app startup (see Dockerfile CMD), not as a release_command,
  # because Fly's release_command machines don't mount volumes.
  strategy = 'immediate'
